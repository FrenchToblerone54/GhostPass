name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0 or v0.1.0)"
        required: true
        type: string
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Normalize version input
        id: ver
        run: |
          ver="${{ inputs.version }}"
          ver="${ver#v}"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - name: Verify version matches version.py
        run: |
          v="$(python -c 'import re, pathlib; txt=pathlib.Path("version.py").read_text(); m=re.search(r"^VERSION\s*=\s*\"([^\"]+)\"", txt, re.M); print(m.group(1) if m else "")')"
          if [ "$v" != "${{ steps.ver.outputs.version }}" ]; then
            echo "version.py VERSION=$v does not match input version=${{ inputs.version }}"
            exit 1
          fi
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile config.py main.py version.py
          python -m py_compile bot/app.py bot/menus.py bot/keyboards.py bot/states.py bot/strings.py
          python -m py_compile bot/handlers/admin.py bot/handlers/consumer.py
          python -m py_compile bot/handlers/payment_card.py bot/handlers/payment_crypto.py bot/handlers/payment_request.py
          python -m py_compile core/db.py core/ghostgate.py core/sync.py
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generateReleaseNotes: true
